<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Ascent Zambia Academy</title>

<link rel="stylesheet" href="css/auth.css">

</head>


<body>


<div class="auth-container">


<div class="auth-box">


<img src="images/ascent-logo.png" 
alt="Ascent Zambia Logo">



<h1>
Welcome Back
</h1>


<p>
Login to continue your learning journey.
</p>




<form id="loginForm">


<label>
Email Address
</label>


<input 
type="email"
id="email"
placeholder="Enter your email"
required>



<label>
Password
</label>


<input 
type="password"
id="password"
placeholder="Enter your password"
required>



<button type="submit">

Login

</button>



</form>



<p class="login-link">

<a href="forgot-password.html">
Forgot Password?
</a>

</p>


<p class="login-link">

Don't have an account?

<a href="register.html">
Register
</a>

</p>



<p id="message"></p>


</div>


</div>



<script type="module" src="js/login.js"></script>


</body>

</html>
