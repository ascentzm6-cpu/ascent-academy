<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Create Account | Ascent Zambia Academy
</title>

<link rel="stylesheet" href="css/auth.css">

</head>


<body>


<div class="auth-container">


<div class="auth-box">


<img src="images/ascent-logo.png" 
alt="Ascent Zambia Academy Logo">



<h1>
Create Account
</h1>



<p>
Join Ascent Zambia Academy and access free professional training.
</p>




<form id="registerForm">



<label>
Full Name
</label>

<input 
type="text"
id="name"
placeholder="Enter your full name"
required>




<label>
Email Address
</label>

<input 
type="email"
id="email"
placeholder="Enter your email address"
required>




<label>
Password
</label>

<input 
type="password"
id="password"
placeholder="Create a password"
minlength="6"
required>




<button type="submit">

Create Account

</button>



</form>




<p id="message"></p>




<div class="auth-footer">

<p>
Already have an account?
</p>

<a href="login.html">
Login here
</a>


</div>



</div>


</div>





<script type="module" src="js/register.js"></script>


</body>


</html>
